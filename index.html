
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Production Monitoring</title>

<style>
:root{
  --main-font:'Segoe UI', sans-serif;
  --header-size:70px;
  --big-number-size:70px;
  --card-title-size:40px;
}

body{
margin:0;
font-family:var(--main-font);
background:#0b1220;
color:#e5e7eb;
}

.header{
text-align:center;
padding:20px;
font-size:var(--header-size);
font-weight:800;
color:#60a5fa;
border-bottom:2px solid #1f2937;
position:relative;
}

.datetime{
text-align:center;
margin:10px 0;
}

#dateDisplay{
font-size:32px;
color:#9ca3af;
}

#clock{
font-size:60px;
font-weight:900;
font-family:'Courier New',monospace;color:#22d3ee;}

/* ================= CONTROLS SETTINGS ================= */

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin:20px;
padding:20px;
background:#111827;
border-radius:20px;
font-size:20px;
}

.controls input{
padding:6px;
width:90px;
font-size:18px;
font-weight:bold;
border-radius:10px;
border:1px solid #334155;background:#0f172a;color:white;text-align:center;
}

.controls button{
padding:8px 18px;
font-size:16px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
}

.start{background:#16a34a;color:white;}
.stop{background:#dc2626;color:white;}
.reset{background:#f59e0b;color:white;}
.summary{background:#2563eb;color:white;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:20px;
}

.card{
background:#111827;
border-radius:20px;
padding:20px;
text-align:center;
}

.card h3{
color:#9ca3af;
margin-bottom:5px;
font-size:var(--card-title-size);
}

.big-number
{font-size:var(--big-number-size);
font-weight:900;}

.bottom{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin:20px;
}

.status-blue{color:#3b82f6;}
.status-green{color:#22c55e;}
.status-red{color:#ef4444;}
.status-orange{color:#f97316;}

.fullscreen-btn{
position:absolute;
right:20px;
top:20px;
padding:5px 10px;
font-size:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.fullscreen-btn:hover{
background:#1d4ed8;
}

.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%{text-shadow:0 0 5px #22c55e;}50%{text-shadow:0 0 20px #22c55e;}100%{text-shadow:0 0 5px #22c55e;}}

.blink{animation:blink 1.5s infinite;}
@keyframes blink{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}

.downtime-alert{background:#3f0d0d !important;box-shadow:0 0 25px rgba(239,68,68,0.8);}

.scan-container{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
flex-wrap:wrap;
}

.scan-box{
width:300px;
padding:12px;
font-size:18px;
border-radius:40px;
background:#0f172a;
border:1px solid #334155;
color:white;
text-align:center;
}

table{
width:95%;
margin:30px auto;
border-collapse:collapse;
background:#111827;
border-radius:15px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:center;
font-size:14px;
}

th{
background:#1f2937;
color:#60a5fa;
}
tr:nth-child(even){background:#0f172a;}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>

<div class="header">
    SMART PRODUCTION MONITORING
    <button class="fullscreen-btn" onclick="toggleFullScreen()">⛶</button>
</div>

<div class="datetime">
<div id="dateDisplay"></div>
<div id="clock"></div>
</div>

<div class="controls">

Cycle Time (min):
<input type="number" id="cycleTarget" min="1">

Daily Plan:
<input type="number" id="dailyPlanTarget" min="1">

Lot:
<input type="number" id="lotInput" placeholder="Lot No">

<button class="start" onclick="startProduction()">Start</button>
<button class="stop" onclick="stopProduction()">Stop</button>
<button class="reset" onclick="resetProduction()">Reset</button>
<button class="summary" onclick="openSummary()">Daily Summary</button>
<button class="summary" onclick="downloadExcel()">Download Excel</button>

<button class="summary" id="ramadanToggle" onclick="toggleRamadan()">
🌙 Ramadhan Mode: OFF
</button>

</div>

<div class="dashboard">
<div class="card"><h3>Countdown</h3><div class="big-number" id="countdown">00:00</div></div>
<div class="card"><h3>Plan</h3><div class="big-number" id="plan">0</div></div>
<div class="card"><h3>Actual</h3><div class="big-number" id="actual">0</div></div>
<div class="card"><h3>Production Balance</h3><div class="big-number status-blue" id="balance">0</div></div>
</div>

<div class="bottom">
<div class="card"><h3>Status</h3><div class="big-number status-blue" id="status">READY</div></div>
<div class="card" id="downtimeCard"><h3>Accumulated Downtime</h3><div class="big-number" id="downtime">00:00</div></div>
</div>

<div class="scan-container">
<input type="text" id="chassisInput" class="scan-box" placeholder="Scan Chassis First" autofocus>
<input type="text" id="modelInput" class="scan-box" placeholder="Scan Model After Chassis">
</div>

<table>
<thead>
<tr>
<th>Time</th><th>Lot</th><th>Model</th><th>Chassis</th><th>Status</th><th>Downtime</th>
</tr>
</thead>
<tbody id="scanTable"></tbody>
</table>

<script>

/* ================= SYSTEM SETTINGS ================= */

const SETTINGS = {

  defaultCycle: 1,
  defaultPlan: 2,

  breakTime: {
    normal: {
      weekday: [
        { start: 600, end: 620 },
        { start: 780, end: 840 }
      ],
      friday: [
        { start: 600, end: 620 },
        { start: 750, end: 870 }
      ]
    },
    ramadan: {
      weekday: [
        { start: 600, end: 610 },
        { start: 780, end: 830 }
      ],
      friday: [
        { start: 600, end: 610 },
        { start: 750, end: 860 }
      ]
    }
  }

};

/* Apply defaults */
document.getElementById("cycleTarget").value = SETTINGS.defaultCycle;
document.getElementById("dailyPlanTarget").value = SETTINGS.defaultPlan;

/* ===== ORIGINAL LOGIC BELOW (UNCHANGED) ===== */

function updateDateTime(){

  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  const dateEl = document.getElementById("dateDisplay");
  const clockEl = document.getElementById("clock");

  if(dateEl && clockEl){
    dateEl.innerText = now.toLocaleDateString("en-MY", options);
    clockEl.innerText = now.toLocaleTimeString("en-MY");
  }
}

/* ===== VARIABLES ===== */

let ramadanMode=false;
let timer=null;
let countdownValue=0;
let actualCount=0;
let downtimeSeconds=0;
let lastScanTime=null;
let startTime=null;
let isDowntime=false;
let pendingChassis="";
let scannedChassis=new Set();
let duplicateLock=false;

/* ===== DATE TIME ===== */

function updateDateTime(){
  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  document.getElementById("dateDisplay").innerText =
    now.toLocaleDateString("en-MY", options);

  document.getElementById("clock").innerText =
    now.toLocaleTimeString("en-MY");
}

/* ===== FORMAT ===== */

function format(s){
const m=Math.floor(s/60);
const sec=s%60;
return (m<10?"0"+m:m)+":"+(sec<10?"0"+sec:sec);
}

/* ===== RAMADAN + BREAK ===== */

function isBreakTime(){

  let now = new Date();
  let current = now.getHours()*60 + now.getMinutes();
  let day = now.getDay();

  let breaks = [];

  if(ramadanMode){

    if(day === 5){
      breaks = SETTINGS.breakTime.ramadan.friday;
    }else{
      breaks = SETTINGS.breakTime.ramadan.weekday;
    }

  }else{

    if(day === 5){
      breaks = SETTINGS.breakTime.normal.friday;
    }else{
      breaks = SETTINGS.breakTime.normal.weekday;
    }

  }

  for(let b of breaks){
    if(current >= b.start && current < b.end){
      return true;
    }
  }

  return false;
}

/* ===== STATUS ===== */

function setStatus(text,color){
const el=document.getElementById("status");
el.innerText=text;
el.className="big-number "+color;
}

/* ===== START ===== */

function startProduction(){
if(timer) return;
if(countdownValue===0){
countdownValue=(parseFloat(document.getElementById("cycleTarget").value)||1)*60;
startTime=new Date();
}
timer=setInterval(()=>{
if(isBreakTime()){
setStatus("BREAK TIME","status-orange");
updateDisplay();
return;
}
if(countdownValue>0){countdownValue--;}
else{downtimeSeconds++;isDowntime=true;}
updateDisplay();
},1000);
}

/* STOP */
function stopProduction(){
clearInterval(timer);
timer=null;
setStatus("PAUSED","status-orange");
}

/* RESET */
function resetProduction(){
clearInterval(timer);
timer=null;
countdownValue=0;
actualCount=0;
downtimeSeconds=0;
lastScanTime=null;
startTime=null;
pendingChassis="";
scannedChassis.clear();
isDowntime=false;
duplicateLock=false;
document.getElementById("scanTable").innerHTML="";
setStatus("READY","status-blue");
updateDisplay();
}

/* ===== SCAN CHASSIS ===== */

document.getElementById("chassisInput").addEventListener("keydown",function(e){
if(e.key==="Enter" && this.value.trim()!==""){
let value=this.value.trim();
if(pendingChassis===value || scannedChassis.has(value)){
duplicateLock=true;
setStatus("DUPLICATE CHASSIS","status-red blink");
this.value="";
return;
}
duplicateLock=false;
pendingChassis=value;
this.value="";
if(!timer){startProduction();}
setStatus("WAITING MODEL","status-orange");
document.getElementById("modelInput").focus();
}
});

/* ===== SCAN MODEL ===== */

document.getElementById("modelInput").addEventListener("keydown",function(e){
if(e.key==="Enter" && this.value.trim()!==""){
if(pendingChassis==="") return;

let model = this.value.trim();
let chassis = pendingChassis;
let lot = document.getElementById("lotInput").value || "-";

let row = document.getElementById("scanTable").insertRow(0);

row.insertCell(0).innerText = new Date().toLocaleTimeString();
row.insertCell(1).innerText = lot;
row.insertCell(2).innerText = model;
row.insertCell(3).innerText = chassis;

let statusCell = row.insertCell(4);
let downtimeCell = row.insertCell(5);

pendingChassis="";
scannedChassis.add(chassis);
sendToSheet(chassis, model);   // <<< TAMBAH SINI

const now=new Date();
const cycleTimeSec=(parseFloat(document.getElementById("cycleTarget").value)||1)*60;

let downtimeEvent="";
let referenceTime=lastScanTime?lastScanTime:startTime;
if(referenceTime){
let diffSec=Math.floor((now-referenceTime)/1000);
if(diffSec>cycleTimeSec){downtimeEvent=format(diffSec-cycleTimeSec);}
}

let plan=parseInt(document.getElementById("dailyPlanTarget").value)||0;

let statusValue = "";
let downtimeValue = "";  
  
if(actualCount>=plan && plan>0){
    statusCell.innerText="-";
    downtimeCell.innerText="";

    statusValue = "-";
    downtimeValue = "";
}
else if(downtimeEvent){
    statusCell.innerText="DOWN TIME";
    statusCell.classList.add("status-red");
    downtimeCell.innerText=downtimeEvent;
    downtimeCell.classList.add("status-red");

    statusValue = "DOWN TIME";
    downtimeValue = downtimeEvent;
}
else{
    statusCell.innerText="SCANNED";
    statusCell.classList.add("status-green");

    statusValue = "SCANNED";
    downtimeValue = "";
}
  
actualCount++;
countdownValue=cycleTimeSec;
isDowntime=false;
lastScanTime=now;
sendToSheet(chassis, model, lot, statusValue, downtimeValue);

updateDisplay();
this.value="";
document.getElementById("chassisInput").focus();
}
});

/* ===== UPDATE DISPLAY ===== */

function updateDisplay(){
let plan=parseInt(document.getElementById("dailyPlanTarget").value)||0;
let balance=actualCount-plan;
let displayBalance=balance>0?("+"+balance):balance;

document.getElementById("plan").innerText=plan;
document.getElementById("actual").innerText=actualCount;
document.getElementById("countdown").innerText=format(countdownValue);
document.getElementById("downtime").innerText=format(downtimeSeconds);

let balanceEl=document.getElementById("balance");
if(balance<0){balanceEl.className="big-number status-red";}
else if(balance>0){balanceEl.className="big-number status-green";}
else{balanceEl.className="big-number status-blue";}
balanceEl.innerText=displayBalance;

if(isBreakTime()){setStatus("BREAK TIME","status-orange");}
else if(duplicateLock){setStatus("DUPLICATE CHASSIS","status-red blink");}
else if(actualCount===0 && !timer){setStatus("READY","status-blue");}
else if(actualCount>=plan && plan>0){
clearInterval(timer);timer=null;countdownValue=0;isDowntime=false;
setStatus("TARGET ACHIEVED","status-green");
}
else if(isDowntime){setStatus("DOWN TIME","status-red blink");}
else if(pendingChassis!==""){setStatus("WAITING MODEL","status-orange");}
else{setStatus("RUNNING","status-green pulse");}

const downtimeCard=document.getElementById("downtimeCard");
const downtimeText=document.getElementById("downtime");
if(isDowntime){
downtimeCard.classList.add("downtime-alert","blink");
downtimeText.classList.add("status-red","blink");
}else{
downtimeCard.classList.remove("downtime-alert","blink");
downtimeText.classList.remove("status-red","blink");
}
}

/* ===== DAILY SUMMARY ===== */

function openSummary(){

let plan=parseInt(document.getElementById("dailyPlanTarget").value)||0;
let actual=actualCount;
let downtime=format(downtimeSeconds);
let diff=actual-plan;
let diffDisplay=diff>0?("+"+diff):diff;

let rows=document.querySelectorAll("#scanTable tr");
let tableRows="";

rows.forEach(row=>{
let cells=row.querySelectorAll("td");
if(cells.length>0){

let statusText=cells[4].innerText;
let downtimeText=cells[5].innerText;

let statusClass=statusText==="DOWN TIME"?"status-red":
(statusText==="SCANNED"?"status-green":"");

tableRows+=`
<tr>
<td>${cells[0].innerText}</td>
<td>${cells[1].innerText}</td>
<td>${cells[2].innerText}</td>
<td>${cells[3].innerText}</td>
<td class="${statusClass}">${statusText}</td>
<td class="${statusClass}">${downtimeText}</td>
</tr>`;
}
});

let htmlContent=`
<html>

`;

let newWindow=window.open();
newWindow.document.write(htmlContent);

}

/* ===== EXCEL ===== */

function downloadExcel(){
let wb=XLSX.utils.book_new();
let data=[["Time","Lot","Model","Chassis","Status","Downtime"]];

document.querySelectorAll("#scanTable tr").forEach(row=>{
let cells=row.querySelectorAll("td");
if(cells.length>0){
data.push([
cells[0].innerText,
cells[1].innerText,
cells[2].innerText,
cells[3].innerText,
cells[4].innerText,
cells[5].innerText
]);
}
});

let ws=XLSX.utils.aoa_to_sheet(data);

for(let i=1;i<data.length;i++){
let cell="E"+(i+1);
if(ws[cell]){
if(ws[cell].v==="DOWN TIME"){
ws[cell].s={font:{color:{rgb:"FF0000"},bold:true}};
}
if(ws[cell].v==="SCANNED"){
ws[cell].s={font:{color:{rgb:"00AA00"},bold:true}};
}
}
}

XLSX.utils.book_append_sheet(wb,ws,"Daily Report");
XLSX.writeFile(wb,"Daily_Summary_Report.xlsx");
}

/* ===== FULL SCREEN ===== */

function toggleFullScreen(){

if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
}else{
    document.exitFullscreen();
}

}

/* ===== RAMADHAN TOGGLE ===== */

function toggleRamadan(){
  ramadanMode = !ramadanMode;

  const btn = document.getElementById("ramadanToggle");

  if(ramadanMode){
    btn.innerText = "🌙 Ramadhan Mode: ON";
    btn.style.background = "#16a34a";
  }else{
    btn.innerText = " 🌙 Ramadhan Mode: OFF";
    btn.style.background = "#2563eb";
  }

  updateDisplay();
}

/* ===== INITIALIZE SYSTEM ===== */

window.onload = function(){ // <<< Sementara

  updateDisplay();
  updateDateTime();

  setInterval(updateDateTime,1000);

};
/* ===== GOOGLE SHEET API ===== */

const API_URL = "https://script.google.com/macros/s/AKfycbyYD3UX0cv4DxEHEdpf31OJI3hUA-UuhqfqB6ZkDysfsWnsSh3MxB3FraU0TRij89Ew6A/exec";

function sendToSheet(chassis, model, lot, status, downtime) {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      lot: lot,
      model: model,
      chassis: chassis,
      status: status,
      plan: parseInt(document.getElementById("dailyPlanTarget").value)||0,
      actual: actualCount,
      downtime: downtime
 
        
</script>
