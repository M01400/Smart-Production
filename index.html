<style>
:root{

.monitor-mode .scan-container{

}

body{
margin:0;
font-family:var(--main-font);
background:#0b1220;
color:#e5e7eb;
}

.header{
text-align:center;
padding:20px;

font-weight:800;

/* ================= CONTROLS SETTINGS ================= */

.controls{

justify-content:center;

gap:20px;
flex-wrap:wrap;

padding:20px;

padding:6px;

font-weight:bold;
border-radius:10px;
border:1px solid #334155;background:#0f172a;color:white;text-align:center;
}

padding:8px 18px;
font-size:16px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
}

.start{background:#16a34a;color:white;}
.stop{background:#dc2626;color:white;}
.reset{background:#f59e0b;color:white;}
.summary{background:#2563eb;color:white;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:20px;
}

.card{
background:#111827;
border-radius:20px;
padding:20px;
text-align:center;
}

.card h3{
color:#9ca3af;
margin-bottom:5px;
font-size:var(--card-title-size);
}

.big-number
{font-size:var(--big-number-size);
font-weight:900;}

.bottom{

grid-template-columns:1fr 1fr;
gap:20px;

}

.status-blue{color:#3b82f6;}
.status-green{color:#22c55e;}
.status-red{color:#ef4444;}

.fullscreen-btn{

right:20px;
top:20px;
padding:5px 10px;
font-size:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.fullscreen-btn:hover{
background:#1d4ed8;
}

.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%{text-shadow:0 0 5px #22c55e;}50%{text-shadow:0 0 20px #22c55e;}100%{text-shadow:0 0 5px #22c55e;}}

.blink{animation:blink 1.5s infinite;}
@keyframes blink{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}

.downtime-alert{background:#3f0d0d !important;box-shadow:0 0 25px rgba(239,68,68,0.8);}

.scan-container{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
flex-wrap:wrap;
}

.scan-box{
width:300px;
padding:12px;
font-size:18px;
border-radius:40px;
background:#0f172a;
border:1px solid #334155;
color:white;
text-align:center;
}

table{
width:95%;
margin:30px auto;
border-collapse:collapse;
background:#111827;
border-radius:15px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:center;
font-size:14px;
}

th{
background:#1f2937;
color:#60a5fa;
}
tr:nth-child(even){background:#0f172a;}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>

<div class="header">
    TF 2 PRODUCTION MONITORING SYSTEM
    <button class="fullscreen-btn" onclick="toggleFullScreen()">⛶</button>
</div>

<div class="datetime">
<div id="dateDisplay"></div>
<div id="clock"></div>
</div>

<div class="controls">

Cycle Time (min):
<input type="number" id="cycleTarget" min="1">

Daily Plan:
<input type="number" id="dailyPlanTarget" min="Daily Plan">

Lot:
<input type="number" id="lotInput" placeholder="Lot No">

<button class="start" onclick="startProduction()">Start</button>

<button class="summary" onclick="downloadExcel()">Download Excel</button>

<button class="summary" id="ramadanToggle" onclick="toggleRamadan()">
🌙 Ramadhan : OFF
</button>

</div>

<div class="dashboard">
<div class="card"><h3>Countdown</h3><div class="big-number" id="countdown">00:00</div></div>
<div class="card"><h3>Plan</h3><div class="big-number" id="plan">0</div></div>
<div class="card"><h3>Actual</h3><div class="big-number" id="actual">0</div></div>
<div class="card"><h3>Production Balance</h3><div class="big-number status-blue" id="balance">0</div></div>
</div>

<div class="bottom">

<div class="card" id="downtimeCard"><h3>Accumulated Downtime</h3><div class="big-number" id="downtime">00:00</div></div>
</div>

<div class="scan-container">
<input type="text" id="chassisInput" class="scan-box" placeholder="Scan Chassis First" autofocus>
<input type="text" id="modelInput" class="scan-box" placeholder="Scan Model">
<input type="text" id="engineInput" class="scan-box" placeholder="Scan Engine No">
<input type="text" id="keyInput" class="scan-box" placeholder="Scan Key No">
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Lot</th>
<th>Model</th>
<th>Chassis</th>
<th>Engine No</th>
<th>Key No</th>
<th>Status</th>
<th>Downtime</th>
</tr>
</thead>
<tbody id="scanTable"></tbody>
</table>

<script>

/* ================= SYSTEM SETTINGS ================= */

const SETTINGS = {

  defaultCycle: 16,
  defaultPlan: 1,

  breakTime: {
    normal: {
      weekday: [
        { start: 600, end: 620 },
        { start: 780, end: 840 }
      ],
      friday: [
        { start: 600, end: 620 },
        { start: 750, end: 870 }
      ]
    },
    ramadan: {
      weekday: [
        { start: 600, end: 610 },
        { start: 780, end: 830 }
      ],
      friday: [
        { start: 600, end: 610 },
        { start: 750, end: 860 }
      ]
    }
  }

};

/* Apply defaults */
document.getElementById("cycleTarget").value = SETTINGS.defaultCycle;
document.getElementById("dailyPlanTarget").value = SETTINGS.defaultPlan;

/* ===== ORIGINAL LOGIC BELOW (UNCHANGED) ===== */

function updateDateTime(){

  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  const dateEl = document.getElementById("dateDisplay");
  const clockEl = document.getElementById("clock");

  if(dateEl && clockEl){
    dateEl.innerText = now.toLocaleDateString("en-MY", options);
    clockEl.innerText = now.toLocaleTimeString("en-MY");
  }
}

/* ===== VARIABLES ===== */

let ramadanMode=false;
let timer=null;
let countdownValue=0;
let actualCount=0;
let downtimeSeconds=0;
let lastScanTime=null;
let startTime=null;
let isDowntime=false;
let pendingChassis="";
let pendingModel="";
let pendingEngine="";
let pendingKey="";
let scannedChassis = new Set();
let scannedModel = new Set();
let scannedEngine = new Set();
let scannedKey = new Set();
let duplicateLock=false;
  
/* ===== DATE TIME ===== */

function updateDateTime(){
  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  document.getElementById("dateDisplay").innerText =
    now.toLocaleDateString("en-MY", options);

  document.getElementById("clock").innerText =
    now.toLocaleTimeString("en-MY");
}

/* ===== FORMAT ===== */

function format(s){
const m=Math.floor(s/60);
const sec=s%60;
return (m<10?"0"+m:m)+":"+(sec<10?"0"+sec:sec);
}

/* ===== RAMADAN + BREAK ===== */

function isBreakTime(){

  let now = new Date();
  let current = now.getHours()*60 + now.getMinutes();
  let day = now.getDay();

  let breaks = [];

  if(ramadanMode){

    if(day === 5){
      breaks = SETTINGS.breakTime.ramadan.friday;
    }else{
      breaks = SETTINGS.breakTime.ramadan.weekday;
    }

  }else{

    if(day === 5){
      breaks = SETTINGS.breakTime.normal.friday;
    }else{
      breaks = SETTINGS.breakTime.normal.weekday;
    }

  }

  for(let b of breaks){
    if(current >= b.start && current < b.end){
      return true;
    }
  }

  return false;
}

/* ===== STATUS ===== */

function setStatus(text,color){
const el=document.getElementById("status");
el.innerText=text;
el.className="big-number "+color;
}

/* ===== START ===== */

function startProduction(){
    if(timer) return; // Jika timer sudah jalan, jangan buat apa-apa
    
    // Set masa permulaan jika baru bermula
    if(countdownValue === 0){
        countdownValue = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;
        startTime = new Date();
    }

    timer = setInterval(() => {
        if(isBreakTime()){
            setStatus("BREAK TIME", "status-orange");
            updateDisplay();
            return;
        }
        
        if(countdownValue > 0){
            countdownValue--;
        } else {
          isDowntime = true;
    
        }
        
        updateDisplay();
    }, 1000);
}

/* STOP */
function stopProduction(){
clearInterval(timer);
timer=null;
setStatus("PAUSED","status-orange");
}

/* RESET */
function resetProduction(){
  
clearInterval(timer);
timer=null;
countdownValue=0;
actualCount=0;
downtimeSeconds=0;
lastScanTime=null;
startTime=null;
pendingChassis="";
scannedChassis.clear();
scannedModel.clear();
scannedEngine.clear();
scannedKey.clear();
isDowntime=false;
duplicateLock=false;
document.getElementById("scanTable").innerHTML="";
  
setStatus("READY","status-blue");
updateDisplay();
}

/* ===== SCAN CHASSIS ===== */

document.getElementById("chassisInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && this.value.trim() !== "") {
        let value = this.value.trim();

        /* DUPLICATE CHECK */
        if (scannedChassis.has(value)) {
            duplicateLock = true;
            setStatus("DUPLICATE CHASSIS", "status-red blink");
            this.value = "";
            return;
        }

        /* --- TAMBAHAN: MULA COUNTDOWN PADA SCAN PERTAMA --- */
        if (!timer) {
            startProduction(); 
        }

        duplicateLock = false;
        pendingChassis = value;
        scannedChassis.add(value);

        this.value = "";
        document.getElementById("modelInput").focus();
    }
});
  
/* ===== SCAN MODEL ===== */

document.getElementById("modelInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingChassis==="") return;

let model=this.value.trim();

duplicateLock=false;

pendingModel=model;
scannedModel.add(model);

this.value="";
document.getElementById("engineInput").focus();

}

});

/* ===== SCAN ENGINE NO ===== */

document.getElementById("engineInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingModel==="") return;

let value=this.value.trim();

/* DUPLICATE CHECK */
if(scannedEngine.has(value)){
duplicateLock=true;
setStatus("DUPLICATE ENGINE","status-red blink");
this.value="";
return;
}

duplicateLock=false;

pendingEngine=value;
scannedEngine.add(value);

this.value="";
document.getElementById("keyInput").focus();

}

});
  
/* ===== SCAN KEY ===== */

document.getElementById("keyInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingChassis==="" || pendingModel==="" || pendingEngine==="") return;

let key=this.value.trim();

/* ===== DUPLICATE CHECK KEY ===== */
if(scannedKey.has(key)){
duplicateLock=true;
setStatus("DUPLICATE KEY","status-red blink");
this.value="";
return;
}

duplicateLock=false;

pendingKey=key;
scannedKey.add(key);
  
let chassis = pendingChassis;
let model = pendingModel;
let engine = pendingEngine;
let lot = document.getElementById("lotInput").value || "-";
  

const now = new Date();
const cycleTimeSec = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;

let downtimeEvent = "";

if(lastScanTime){
    let diffSec = Math.floor((now - lastScanTime) / 1000);

    if(diffSec > cycleTimeSec){
        let actualDowntime = diffSec - cycleTimeSec;

        downtimeEvent = format(actualDowntime);

        // ✅ accumulate dashboard
        downtimeSeconds += actualDowntime;

        // ✅ TRIGGER STATUS
        isDowntime = true;

    } else {
        // ✅ TAK DOWNTIME
        isDowntime = false;
    }
} else {
    isDowntime = false;
}

lastScanTime = now;

let row=document.getElementById("scanTable").insertRow(0);

row.insertCell(0).innerText=now.toLocaleDateString();
row.insertCell(1).innerText=now.toLocaleTimeString();
row.insertCell(2).innerText=lot;
row.insertCell(3).innerText=model;
row.insertCell(4).innerText=chassis;
row.insertCell(5).innerText=engine;
row.insertCell(6).innerText=key;

let statusCell=row.insertCell(7);
let downtimeCell=row.insertCell(8);

if(downtimeEvent){
statusCell.innerText="DOWN TIME";
statusCell.classList.add("status-red");
downtimeCell.innerText=downtimeEvent;
downtimeCell.classList.add("status-red");
}
else{
statusCell.innerText="SCANNED";
statusCell.classList.add("status-green");
}

actualCount++;
countdownValue=cycleTimeSec;
isDowntime=false;

updateDisplay();

sendToSheet(
  chassis,
  model,
  engine,
  key,
  lot,
  statusCell.innerText,
  downtimeEvent
);

pendingChassis="";
pendingModel="";
pendingEngine="";
pendingKey="";

this.value="";

setTimeout(()=>{
document.getElementById("chassisInput").focus();
},50);
  
}
});
  
/* ===== UPDATE DISPLAY ===== */

function updateDisplay() {
    let plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;
    let balance = actualCount - plan;
    let displayBalance = balance > 0 ? ("+" + balance) : balance;

    document.getElementById("plan").innerText = plan;
    document.getElementById("actual").innerText = actualCount;
    document.getElementById("countdown").innerText = format(countdownValue);
    document.getElementById("downtime").innerText = format(downtimeSeconds);

    let balanceEl = document.getElementById("balance");
    if (balance < 0) { balanceEl.className = "big-number status-red"; } 
    else if (balance > 0) { balanceEl.className = "big-number status-green"; } 
    else { balanceEl.className = "big-number status-blue"; }
    balanceEl.innerText = displayBalance;

    /* ================= LOGIK STATUS BARU ================= */
    if (isBreakTime()) {
        setStatus("BREAK TIME", "status-orange");
    } 
    else if (duplicateLock) {
        setStatus("DUPLICATE SCAN", "status-red blink");
    } 
    else if (isDowntime) {
        setStatus("DOWN TIME", "status-red blink");
    } 
    else if (actualCount >= plan && plan > 0) {
        clearInterval(timer); timer = null; countdownValue = 0; isDowntime = false;
        setStatus("TARGET ACHIEVED", "status-green");
    } 
    // Jika sedang dalam proses scan (salah satu input sudah diisi tapi belum lengkap semua)
    else if (pendingChassis !== "" && pendingModel === "") {
        setStatus("WAITING MODEL", "status-orange");
    } 
    else if (pendingModel !== "" && pendingEngine === "") {
        setStatus("WAITING ENGINE", "status-orange");
    } 
    else if (pendingEngine !== "" && pendingKey === "") {
        setStatus("WAITING KEY", "status-orange");
    } 
    // Jika timer sedang jalan dan tiada proses scan yang tertunggak, status adalah RUNNING
    else if (timer) {
        setStatus("RUNNING", "status-green pulse");
    } 
    else {
        setStatus("READY", "status-blue");
    }
    /* ===================================================== */

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");
    if (isDowntime) {
        downtimeCard.classList.add("downtime-alert", "blink");
        downtimeText.classList.add("status-red", "blink");
    } else {
        downtimeCard.classList.remove("downtime-alert", "blink");
        downtimeText.classList.remove("status-red", "blink");
    }
}
/* ===== DAILY SUMMARY ===== */

/* ===== DAILY SUMMARY (VERSI DIKEMASKINI: SAMA PERSIH DENGAN DASHBOARD) ===== */

function openSummary() {
    let plan = parseInt(document.getElementById("plan").innerText) || 0;
    let actual = parseInt(document.getElementById("actual").innerText) || 0;
    let downtime = document.getElementById("downtime").innerText;
    let diff = actual - plan;
    let diffDisplay = diff > 0 ? ("+" + diff) : diff;

    // Ambil semua baris dari jadual papan pemuka
    let rows = document.querySelectorAll("#scanTable tr");
    let tableRows = "";

    // Gelung setiap baris papan pemuka untuk mengekstrak data dan kelas warna
    rows.forEach(row => {
        let cells = row.querySelectorAll("td");
        if (cells.length > 0) {
            // Ambil sel Status dan sel Downtime untuk mengekstrak kelas warna
            let statusCell = cells[7];
            let downtimeCell = cells[8];

            // Tentukan kelas warna status yang betul
            let statusClass = "";
            if (statusCell.classList.contains("status-red")) {
                statusClass = "status-red";
            } else if (statusCell.classList.contains("status-green")) {
                statusClass = "status-green";
            }

            // Tentukan kelas warna downtime yang betul
            let downtimeClass = "";
            if (downtimeCell.classList.contains("status-red")) {
                downtimeClass = "status-red";
            }

            // Bina HTML baris untuk laporan, memindahkan data DAN kelas warna
            tableRows += `
<tr>
<td>${cells[0].innerText}</td> <td>${cells[1].innerText}</td> <td>${cells[2].innerText}</td> <td>${cells[3].innerText}</td> <td>${cells[4].innerText}</td> <td>${cells[5].innerText}</td> <td>${cells[6].innerText}</td> <td class="${statusClass}">${cells[7].innerText}</td> <td class="${downtimeClass}">${cells[8].innerText}</td> </tr>`;
        }
    });

    // Kandungan HTML Laporan Larian Harian
    let htmlContent = `

/* ===== EXCEL ===== */

function downloadExcel(){
let wb=XLSX.utils.book_new();
let data=[["Date","Time","Lot","Model","Chassis","Engine No","Key No","Status","Downtime"]];

document.querySelectorAll("#scanTable tr").forEach(row=>{
let cells=row.querySelectorAll("td");
if(cells.length>0){
data.push([
cells[0].innerText,
cells[1].innerText,
cells[2].innerText,
cells[3].innerText,
cells[4].innerText,
cells[5].innerText,
cells[6].innerText,
cells[7].innerText,
cells[8].innerText
]);
}
});

let ws=XLSX.utils.aoa_to_sheet(data);

for(let i=1;i<data.length;i++){
let cell="E"+(i+1);
if(ws[cell]){
if(ws[cell].v==="DOWN TIME"){
ws[cell].s={font:{color:{rgb:"FF0000"},bold:true}};
}
if(ws[cell].v==="SCANNED"){
ws[cell].s={font:{color:{rgb:"00AA00"},bold:true}};
}
}
}

XLSX.utils.book_append_sheet(wb,ws,"Daily Report");
XLSX.writeFile(wb,"Daily_Summary_Report.xlsx");
}

/* ================= GOOGLE SHEET MIRROR LAYER ================= */

// 🔴 GANTI DENGAN LINK /exec WEB APP ANDA
const API_URL = "https://script.google.com/macros/s/AKfycbyYD3UX0cv4DxEHEdpf31OJI3hUA-UuhqfqB6ZkDysfsWnsSh3MxB3FraU0TRij89Ew6A/exec";

// Detect monitor mode (?monitor)
const isMonitor = window.location.search.includes("monitor");

// Hantar state live setiap saat (MAIN PC sahaja)
function updateLiveStateOnly(){

  if(isMonitor) return; // monitor tak hantar data

  const plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;
  const actual = actualCount;
  const balance = actual - plan;
  const status = document.getElementById("status").innerText.trim();

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      liveOnly: true,
      plan: plan,
      actual: actual,
      balance: balance,
      status: status,
      countdown: countdownValue,
      totalDowntime: downtimeSeconds
    })
  }).catch(err => console.log("Live state error:", err));

}
  
function sendToSheet(chassis, model, engine, key, lot, status, downtimeEvent){
  const plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;
  const actual = actualCount;
  const balance = actual - plan;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      lot: lot,
      model: model,
      chassis: chassis,
      engine: engine,
      key: key,
      status: status,
      plan: plan,
      actual: actual,
      balance: balance,
      downtimeEvent: downtimeEvent,
      totalDowntime: downtimeSeconds,
      countdown: countdownValue
    })
  })
  .catch(err=>console.log("Sheet error:",err));

}
// Ambil data untuk MONITOR PC
function loadLiveData(){

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const scanRows = data.scan.slice(1);
const table = document.getElementById("scanTable");
table.innerHTML="";

scanRows.reverse().forEach(row => {
    let newRow = table.insertRow();

    // 1. DATE & TIME (Diambil dari Kolum A - row[0])
    let fullDateTime = new Date(row[0]);
    newRow.insertCell(0).innerText = fullDateTime.toLocaleDateString("en-GB");
    newRow.insertCell(1).innerText = fullDateTime.toLocaleTimeString("en-GB", {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
    }).toLowerCase();

    // 2. DATA UTAMA (Susunan mengikut Google Sheet anda)
    newRow.insertCell(2).innerText = row[1] || "-"; // Lot (Kolum B)
    newRow.insertCell(3).innerText = row[2] || "-"; // Model (Kolum C)
    newRow.insertCell(4).innerText = row[3] || "-"; // Chassis (Kolum D)
    newRow.insertCell(5).innerText = row[4] || "-"; // Engine No (Kolum E)
    newRow.insertCell(6).innerText = row[5] || "-"; // Key No (Kolum F)

    // 3. STATUS (Kolum G) + Warna
    let statusCell = newRow.insertCell(7);
    let statusText = row[6] || "";
    statusCell.innerText = statusText;
    if(statusText === "SCANNED") statusCell.className = "status-green";
    if(statusText === "DOWN TIME") statusCell.className = "status-red";

    // 4. DOWNTIME (Kolum J -> row[9]) - DIAMBIL SEBAGAI TEKS SAHAJA
    let downtimeCell = newRow.insertCell(8);
    let rawDowntime = row[9] || "";

// Pastikan format mm:ss
if(rawDowntime){

    let text = rawDowntime.toString();

    if(text.includes(":")){
        let parts = text.split(":");

        if(parts.length === 3){
            downtimeCell.innerText = parts[1] + ":" + parts[2];
        }
        else if(parts.length === 2){
            downtimeCell.innerText = ("0"+parts[0]).slice(-2) + ":" + ("0"+parts[1]).slice(-2);
        }
        else{
            downtimeCell.innerText = text;
        }
    }
}

    if(statusText === "DOWN TIME") downtimeCell.className = "status-red";
});
      
      const state = data.state[data.state.length - 1];
      if(!state) return;

      const plan = parseInt(state[0]) || 0;
      const actual = parseInt(state[1]) || 0;
      const balance = parseInt(state[2]) || 0;
      const status = state[3] || "READY";
      const totalDowntime = parseInt(state[4]) || 0;
      const countdown = parseInt(state[5]) || 0;

      // Update dashboard
      document.getElementById("plan").innerText = plan;
      document.getElementById("actual").innerText = actual;
      
      countdownValue = countdown;
      document.getElementById("countdown").innerText = format(countdownValue);
    
      document.getElementById("downtime").innerText = format(totalDowntime);

      // Balance
      const balanceEl = document.getElementById("balance");
      if(balance < 0){
        balanceEl.className="big-number status-red";
        balanceEl.innerText = balance;
      }
      else if(balance > 0){
        balanceEl.className="big-number status-green";
        balanceEl.innerText = "+" + balance;
      }
      else{
        balanceEl.className="big-number status-blue";
        balanceEl.innerText = "0";
      }

 // Status mirror
if(status === "DOWN TIME"){
    setStatus("DOWN TIME","status-red blink");

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");

    downtimeCard.classList.add("downtime-alert","blink");
    downtimeText.classList.add("status-red","blink");
}

else if(status === "RUNNING"){
    setStatus("RUNNING","status-green pulse");

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");

    downtimeCard.classList.remove("downtime-alert","blink");
    downtimeText.classList.remove("status-red","blink");
}

else if(status === "TARGET ACHIEVED"){
    setStatus("TARGET ACHIEVED","status-green");

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");

    downtimeCard.classList.remove("downtime-alert","blink");
    downtimeText.classList.remove("status-red","blink");
}

else{
    setStatus(status,"status-blue");

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");

    downtimeCard.classList.remove("downtime-alert","blink");
    downtimeText.classList.remove("status-red","blink");
}
    })
    .catch(err => console.log("Monitor load error:", err));
}

/* ===== INITIALIZE SYSTEM ===== */

window.onload = function(){
  
  updateDisplay();
  updateDateTime();
  setInterval(updateDateTime,1000);

  if(isMonitor){
  document.body.classList.add("monitor-mode");


  // Hide scan input
  document.getElementById("chassisInput").style.display="none";
  document.getElementById("modelInput").style.display="none";
  document.getElementById("engineInput").style.display="none";
  document.getElementById("keyInput").style.display="none";

  loadLiveData();
  setInterval(loadLiveData,1500);

  } else {

    // MAIN PC push live state setiap 1 saat
    setInterval(updateLiveStateOnly,1000);

  }

};
