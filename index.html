<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TF 2 Production Monitoring</title>

<style>
/* ===== CLEAN SCADA CSS ===== */

body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:white;
}

/* HEADER */
.top-header{
  text-align:center;
  padding:15px;
}

.title{
  font-size:40px;
  color:#22d3ee;
  font-weight:900;
}

.datetime{
  color:#94a3b8;
}

/* CONTROL BAR */
.controls-bar{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

.controls-bar input{
  width:80px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  text-align:center;
}

/* BUTTON */
.btn{
  padding:6px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.start{background:#16a34a;}
.stop{background:#dc2626;}
.reset{background:#f59e0b;}
.summary{background:#2563eb;}

/* ===== MAIN SCADA GRID ===== */
.scada{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:20px;
  padding:20px;
}

/* PANELS */
.panel{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* BOX */
.box{
  background:#020617;
  border-radius:12px;
  padding:15px;
  border:1px solid #1e293b;
  text-align:center;
}

/* COLORS */
.green{border:1px solid #22c55e; box-shadow:0 0 15px #22c55e;}
.blue{border:1px solid #38bdf8; box-shadow:0 0 15px #38bdf8;}
.red{border:1px solid #ef4444; box-shadow:0 0 15px #ef4444;}
.yellow{border:1px solid #facc15; box-shadow:0 0 15px #facc15;}
.neon{border:1px solid #22d3ee; box-shadow:0 0 15px #22d3ee;}

/* COUNTDOWN */
.big{
  height:180px;
}

.countdown{
  font-size:80px;
  color:#22d3ee;
  font-weight:bold;
}

/* NUMBERS */
.num{
  font-size:50px;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* STATUS */
.status-box{
  font-size:35px;
  color:#22c55e;
}

.status-sub{
  font-size:12px;
  color:#94a3b8;
}

/* SCAN INPUT */
.scan{
  display:flex;
  align-items:center;
  gap:10px;
  background:#020617;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.scan input{
  flex:1;
  border:none;
  background:none;
  color:white;
  outline:none;
}

/* ALERT BLINK */
.alert{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4;}
}

/* TABLE */
table{
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
}

th{
  background:#0f172a;
  color:#38bdf8;
}

tr:nth-child(even){
  background:#0f172a;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>

<div class="top-header">
  <div class="title">TF 2 PRODUCTION MONITORING SYSTEM</div>
  <div class="datetime">
    <div id="dateDisplay"></div>
    <div id="clock"></div>
  </div>
</div>

<div class="controls-bar">
  <div>Cycle Time: <input id="cycleTarget" type="number"></div>
  <div>Daily Plan: <input id="dailyPlanTarget" type="number"></div>
  <div>Lot: <input id="lotInput" type="text"></div>

  <button class="btn start" onclick="startProduction()">Start</button>
  <button class="btn stop" onclick="stopProduction()">Stop</button>
  <button class="btn reset" onclick="resetProduction()">Reset</button>
  <button class="btn summary" onclick="openSummary()">Summary</button>
</div>

<div class="scada">

  <!-- LEFT -->
  <div class="panel left">

    <div class="box neon">
      <div class="box-title">SCAN INPUT</div>

      <div class="scan">
        <span>🚗</span><input id="chassisInput" placeholder="Scan Chassis">
      </div>
      <div class="scan">
        <span>📦</span><input id="modelInput" placeholder="Scan Model">
      </div>
      <div class="scan">
        <span>⚙️</span><input id="engineInput" placeholder="Scan Engine No">
      </div>
      <div class="scan">
        <span>🔑</span><input id="keyInput" placeholder="Scan Key No">
      </div>
    </div>

    <div class="box neon">
      <div class="box-title">LINE STATUS</div>
      <div id="status" class="status-box">READY</div>
      <div class="status-sub">Waiting to Start</div>
    </div>

  </div>

  <!-- CENTER -->
  <div class="panel center">

    <div class="box big">
      <div class="box-title">COUNTDOWN</div>
      <div id="countdown" class="countdown">00:00</div>
    </div>

    <div class="grid">

      <div class="box green">
        <div class="box-title">ACTUAL</div>
        <div id="actual" class="num">0</div>
      </div>

      <div class="box blue">
        <div class="box-title">EXPECTED</div>
        <div id="expected" class="num">0</div>
      </div>

      <div class="box">
        <div class="box-title">PLAN</div>
        <div id="plan" class="num">0</div>
      </div>

      <div class="box yellow">
        <div class="box-title">BALANCE</div>
        <div id="balance" class="num">0</div>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="panel right">

    <div class="box red">
      <div class="box-title">DELAY</div>
      <div id="delay" class="num">0</div>
    </div>

    <div class="box red alert" id="downtimeCard">
      <div class="box-title">DOWNTIME</div>
      <div id="downtime" class="num">00:00</div>
    </div>

    <div class="box green">
      <div class="box-title">EFFICIENCY</div>
      <div id="efficiency" class="num">0%</div>
    </div>

  </div>

</div>

<!-- TABLE KEEP SAME -->
<table>
<thead>
<tr>
<th>Date</th><th>Time</th><th>Lot</th><th>Model</th>
<th>Chassis</th><th>Engine</th><th>Key</th><th>Status</th><th>Downtime</th>
</tr>
</thead>
<tbody id="scanTable"></tbody>
</table>

<script>

/* ================= SYSTEM SETTINGS ================= */

const SETTINGS = {

  defaultCycle: 16,
  defaultPlan: 1,

  breakTime: {
    normal: {
      weekday: [
        { start: 600, end: 620 },
        { start: 780, end: 840 }
      ],
      friday: [
        { start: 600, end: 620 },
        { start: 750, end: 870 }
      ]
    },
    ramadan: {
      weekday: [
        { start: 600, end: 610 },
        { start: 780, end: 830 }
      ],
      friday: [
        { start: 600, end: 610 },
        { start: 750, end: 860 }
      ]
    }
  }

};

/* Apply defaults */
document.getElementById("cycleTarget").value = SETTINGS.defaultCycle;
document.getElementById("dailyPlanTarget").value = SETTINGS.defaultPlan;
// 🔥 LIVE UPDATE WHEN USER CHANGE INPUT
document.getElementById("cycleTarget").addEventListener("input", () => {
if(!timer){
    countdownValue = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;
}
  
updateDisplay();
});

document.getElementById("dailyPlanTarget").addEventListener("input", () => {
updateDisplay();
});

/* ===== ORIGINAL LOGIC BELOW (UNCHANGED) ===== */

function updateDateTime(){

  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  const dateEl = document.getElementById("dateDisplay");
  const clockEl = document.getElementById("clock");

  if(dateEl && clockEl){
    dateEl.innerText = now.toLocaleDateString("en-MY", options);
    clockEl.innerText = now.toLocaleTimeString("en-MY");
  }
}

/* ================= STRICT GLOBAL LOCK ================= */

async function checkAccess(){

  // ✅ Allow monitor screen
  if(window.location.search.includes("monitor")){
    return true;
  }

  // 🔹 Create unique device ID (once only)
  let deviceId = localStorage.getItem("DEVICE_ID");

  if(!deviceId){
    deviceId = "DEV-" + Math.random().toString(36).substring(2);
    localStorage.setItem("DEVICE_ID", deviceId);
  }

  try{

    // 🔹 STEP 1: CHECK LOCK
    let res = await fetch(API_URL + "?checkLock=true");
    let data = await res.json();

    console.log("LOCK DATA:", data);

    // ❌ STRICT MODE → BLOCK IF ANY LOCK EXISTS
    if(data.lock){

      document.body.innerHTML = `
        <h1 style="
          color:red;
          text-align:center;
          margin-top:100px;
          font-size:40px;
        ">
          SYSTEM ALREADY OPEN ON ANOTHER SCREEN
        </h1>
      `;

      return false;
    }

    // 🔹 STEP 2: CLAIM LOCK
    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        lockRequest:true,
        deviceId: deviceId
      })
    });

  }catch(err){
    console.log("Lock error:", err);
  }

  return true;
}
  
/* ===== VARIABLES ===== */

let ramadanMode=false;
let timer=null;
let countdownValue=0;
let actualCount=0;
let downtimeSeconds=0;
let lastScanTime=null;
let startTime=null;
let isDowntime=false;
let pendingChassis="";
let pendingModel="";
let pendingEngine="";
let pendingKey="";
let scannedChassis = new Set();
let scannedModel = new Set();
let scannedEngine = new Set();
let scannedKey = new Set();
let duplicateLock=false;
let lastUpdateTime = 0;
let lastTableData = "";
  
/* ===== DATE TIME ===== */

function updateDateTime(){
  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  };

  document.getElementById("dateDisplay").innerText =
    now.toLocaleDateString("en-MY", options);

  document.getElementById("clock").innerText =
    now.toLocaleTimeString("en-MY");
}

/* ===== FORMAT ===== */

function format(s){
const m=Math.floor(s/60);
const sec=s%60;
return (m<10?"0"+m:m)+":"+(sec<10?"0"+sec:sec);
}

/* ===== RAMADAN + BREAK ===== */

function isBreakTime(){

  let now = new Date();
  let current = now.getHours()*60 + now.getMinutes();
  let day = now.getDay();

  let breaks = [];

  if(ramadanMode){

    if(day === 5){
      breaks = SETTINGS.breakTime.ramadan.friday;
    }else{
      breaks = SETTINGS.breakTime.ramadan.weekday;
    }

  }else{

    if(day === 5){
      breaks = SETTINGS.breakTime.normal.friday;
    }else{
      breaks = SETTINGS.breakTime.normal.weekday;
    }

  }

  for(let b of breaks){
    if(current >= b.start && current < b.end){
      return true;
    }
  }

  return false;
}

function calculateExpectedOutput(){
    if(isMonitor) return 0;
    if(!startTime) return 0;
    if(!timer){
    return actualCount;
    }

  // ✅ STOP expected when target achieved
    let plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;
    if(actualCount >= plan && plan > 0){
    return plan;
}

    const now = new Date();
    let elapsedSec = Math.floor((now - startTime) / 1000);

    const cycleTimeSec = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;

    // 🚫 Tolak break Stime
    let breakSeconds = 0;

    let tempTime = new Date(startTime);

    while(tempTime < now){
        if(isBreakTime()){
            breakSeconds += 60;
        }
        tempTime.setMinutes(tempTime.getMinutes() + 1);
    }

   let netTime = elapsedSec - breakSeconds;

    if(netTime < 0) netTime = 0;
    
    let expected = Math.floor(netTime / cycleTimeSec);
    
    // 🔥 START SHOW AFTER FIRST SCAN
    if(actualCount > 0 && expected === 0){
        expected = 1;
    }
  
  return expected;

}
  
/* ===== STATUS ===== */

function setStatus(text,color){
const el=document.getElementById("status");
el.innerText=text;
el.className="big-number "+color;
}

/* ===== START ===== */

function startProduction(){
    if(isMonitor) return;
    if(timer) return;

    // Set start time if first run
    if(!startTime){
        startTime = new Date();
    }

    // If no scan yet, set initial countdown
    if(countdownValue === 0){
        countdownValue = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;
    }

    timer = setInterval(() => {

        if(isBreakTime()){
            setStatus("BREAK TIME", "status-orange");
            updateDisplay();
            return;
        }

        const cycleTimeSec = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;

        // 🔥 USE REAL TIME (FIXED)
        const now = new Date();
        
        // use startTime if no scan yet
        const baseTime = lastScanTime || startTime;
        
        const diff = Math.floor((now - baseTime) / 1000);
        
        countdownValue = Math.max(cycleTimeSec - diff, 0);
        
        if(countdownValue === 0){
            isDowntime = true;
        } else {
            isDowntime = false;
        }

        updateDisplay();

    }, 1000);
}

/* STOP */
function stopProduction(){
clearInterval(timer);
timer=null;
setStatus("PAUSED","status-orange");
}

/* RESET */
function resetProduction(){
  
clearInterval(timer);
timer=null;
countdownValue=0;
actualCount=0;
downtimeSeconds=0;
lastScanTime=null;
startTime=null;
pendingChassis="";
scannedChassis.clear();
scannedModel.clear();
scannedEngine.clear();
scannedKey.clear();
isDowntime=false;
duplicateLock=false;
document.getElementById("scanTable").innerHTML="";
  
setStatus("READY","status-blue");
updateDisplay();
updateLiveStateOnly();

}

/* ===== SCAN CHASSIS ===== */

document.getElementById("chassisInput").addEventListener("keydown", function(e) {
if (e.key === "Enter" && this.value.trim() !== "") {
let value = this.value.trim();

/* DUPLICATE CHECK */
if (scannedChassis.has(value)) {
duplicateLock = true;
setStatus("DUPLICATE CHASSIS", "status-red blink");
this.value = "";
return;
}

/* --- START COUNTDOWN ON FIRST SCAN --- */
if (!timer) {
startProduction(); 
}

duplicateLock = false;
pendingChassis = value;
scannedChassis.add(value);

this.value = "";
document.getElementById("modelInput").focus();
}
});
  
/* ===== SCAN MODEL ===== */

document.getElementById("modelInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingChassis==="") return;

let model=this.value.trim();

duplicateLock=false;

pendingModel=model;
scannedModel.add(model);

this.value="";
document.getElementById("engineInput").focus();

}

});

/* ===== SCAN ENGINE NO ===== */

document.getElementById("engineInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingModel==="") return;

let value=this.value.trim();

/* DUPLICATE CHECK */
if(scannedEngine.has(value)){
duplicateLock=true;
setStatus("DUPLICATE ENGINE","status-red blink");
this.value="";
return;
}

duplicateLock=false;

pendingEngine=value;
scannedEngine.add(value);

this.value="";
document.getElementById("keyInput").focus();

}

});
  
/* ===== SCAN KEY ===== */

document.getElementById("keyInput").addEventListener("keydown",function(e){

if(e.key==="Enter" && this.value.trim()!==""){

if(pendingChassis==="" || pendingModel==="" || pendingEngine==="") return;

let key=this.value.trim();

/* ===== DUPLICATE CHECK KEY ===== */
if(scannedKey.has(key)){
duplicateLock=true;
setStatus("DUPLICATE KEY","status-red blink");
this.value="";
return;
}

duplicateLock=false;

pendingKey=key;
scannedKey.add(key);
  
let chassis = pendingChassis;
let model = pendingModel;
let engine = pendingEngine;
let lot = document.getElementById("lotInput").value || "-";
  

const now = new Date();
const cycleTimeSec = (parseFloat(document.getElementById("cycleTarget").value) || 1) * 60;

let downtimeEvent = "";

if(lastScanTime){
    let diffSec = Math.floor((now - lastScanTime) / 1000);

    if(diffSec > cycleTimeSec){
    let actualDowntime = diffSec - cycleTimeSec;

    let plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;

    // ✅ ONLY BEFORE TARGET
    if((actualCount + 1) <= plan){
        downtimeEvent = format(actualDowntime);
        downtimeSeconds += actualDowntime;
        isDowntime = true;
    } else {
        downtimeEvent = "";
        isDowntime = false;
    }

        // ✅ TRIGGER STATUS
        isDowntime = true;

    } else {
        // ✅ TAK DOWNTIME
        isDowntime = false;
    }
} else {
    isDowntime = false;
}

lastScanTime = now;

let row=document.getElementById("scanTable").insertRow(0);

row.insertCell(0).innerText=now.toLocaleDateString();
row.insertCell(1).innerText=now.toLocaleTimeString();
row.insertCell(2).innerText=lot;
row.insertCell(3).innerText=model;
row.insertCell(4).innerText=chassis;
row.insertCell(5).innerText=engine;
row.insertCell(6).innerText=key;

let statusCell=row.insertCell(7);
let downtimeCell=row.insertCell(8);

if(downtimeEvent){
statusCell.innerText="DOWN TIME";
statusCell.classList.add("status-red");
downtimeCell.innerText=downtimeEvent;
downtimeCell.classList.add("status-red");
}
else{
statusCell.innerText="SCANNED";
statusCell.classList.add("status-green");
}

actualCount++;
countdownValue=cycleTimeSec;
isDowntime=false;

updateDisplay();

sendToSheet(
  chassis,
  model,
  engine,
  key,
  lot,
  statusCell.innerText,
  downtimeEvent
);

pendingChassis="";
pendingModel="";
pendingEngine="";
pendingKey="";

this.value="";

setTimeout(()=>{
document.getElementById("chassisInput").focus();
},50);
  
}
});
  
/* ===== UPDATE DISPLAY ===== */

function updateDisplay() {
    if(isMonitor) return;
    let plan = parseInt(document.getElementById("dailyPlanTarget").value) || 0;
    let balance = actualCount - plan;
    let displayBalance = balance > 0 ? ("+" + balance) : balance;

    //  EXPECTED CALCULATION
    let expected = calculateExpectedOutput();

    // ✅ FORCE CORRECT LOGIC AFTER TARGET
    if(actualCount >= plan && plan > 0){
        expected = plan;
}
    let delay = actualCount - expected;
    let delayEl = document.getElementById("delay");

    delayEl.className = "big-number";
    
    if(delay < 0){
        delayEl.classList.add("status-red");
    } 
    else if(delay > 0){
        delayEl.classList.add("status-green");
    } 
    else{
        delayEl.classList.add("status-blue");
    }
    
    delayEl.innerText = delay > 0 ? ("+" + delay) : delay;
      
    let efficiency = 0;

    if(expected > 0){
    efficiency = (actualCount / expected) * 100;
    }
    
    efficiency = Math.floor(efficiency);
    
    let effEl = document.getElementById("efficiency");
    effEl.innerText = efficiency + "%";

    if(efficiency < 90){
    effEl.className = "big-number status-red";
    }
    else if(efficiency < 100){
    effEl.className = "big-number status-orange";
    }
    else{
    effEl.className = "big-number status-green";
    }
    
    // Display Expected
    document.getElementById("expected").innerText = expected;
    document.getElementById("plan").innerText = plan;
    document.getElementById("actual").innerText = actualCount;
    document.getElementById("countdown").innerText = format(countdownValue);
    document.getElementById("downtime").innerText = format(downtimeSeconds);

    let balanceEl = document.getElementById("balance");
    if (balance < 0) { balanceEl.className = "big-number status-red"; } 
    else if (balance > 0) { balanceEl.className = "big-number status-green"; } 
    else { balanceEl.className = "big-number status-blue"; }
    balanceEl.innerText = displayBalance;
    if(delay < 0){
    setStatus("BEHIND SCHEDULE","status-red blink");
}

    /* ================= LOGIK STATUS BARU ================= */
    if (isBreakTime()) {
        setStatus("BREAK TIME", "status-orange");
    } 
    else if (duplicateLock) {
        setStatus("DUPLICATE SCAN", "status-red blink");
    } 
    else if (isDowntime) {
        setStatus("DOWN TIME", "status-red blink");
    } 
    else if (actualCount >= plan && plan > 0) {
        clearInterval(timer); timer = null; countdownValue = 0; isDowntime = false;
        setStatus("TARGET ACHIEVED", "status-green");
    } 
    // Jika sedang dalam proses scan (salah satu input sudah diisi tapi belum lengkap semua)
    else if (pendingChassis !== "" && pendingModel === "") {
        setStatus("WAITING MODEL", "status-orange");
    } 
    else if (pendingModel !== "" && pendingEngine === "") {
        setStatus("WAITING ENGINE", "status-orange");
    } 
    else if (pendingEngine !== "" && pendingKey === "") {
        setStatus("WAITING KEY", "status-orange");
    } 
    // Jika timer sedang jalan dan tiada proses scan yang tertunggak, status adalah RUNNING
    else if (timer) {
        setStatus("RUNNING", "status-green pulse");
    } 
    else {
        setStatus("READY", "status-blue");
    }
    /* ===================================================== */

    const downtimeCard = document.getElementById("downtimeCard");
    const downtimeText = document.getElementById("downtime");
    if (isDowntime) {
        downtimeCard.classList.add("downtime-alert", "blink");
        downtimeText.classList.add("status-red", "blink");
    } else {
        downtimeCard.classList.remove("downtime-alert", "blink");
        downtimeText.classList.remove("status-red", "blink");
    }
}
/* ===== DAILY SUMMARY ===== */

/* ===== DAILY SUMMARY (VERSI DIKEMASKINI: SAMA PERSIH DENGAN DASHBOARD) ===== */

function openSummary() {
    let plan = parseInt(document.getElementById("plan").innerText) || 0;
    let actual = parseInt(document.getElementById("actual").innerText) || 0;
    let downtime = document.getElementById("downtime").innerText;
    let diff = actual - plan;
    let diffDisplay = diff > 0 ? ("+" + diff) : diff;

    // Ambil semua baris dari jadual papan pemuka
    let rows = document.querySelectorAll("#scanTable tr");
    let tableRows = "";

    // Gelung setiap baris papan pemuka untuk mengekstrak data dan kelas warna
    rows.forEach(row => {
        let cells = row.querySelectorAll("td");
        if (cells.length > 0) {
            // Ambil sel Status dan sel Downtime untuk mengekstrak kelas warna
            let statusCell = cells[7];
            let downtimeCell = cells[8];

            // Tentukan kelas warna status yang betul
            let statusClass = "";
            if (statusCell.classList.contains("status-red")) {
                statusClass = "status-red";
            } else if (statusCell.classList.contains("status-green")) {
                statusClass = "status-green";
            }

            // Tentukan kelas warna downtime yang betul
            let downtimeClass = "";
            if (downtimeCell.classList.contains("status-red")) {
                downtimeClass = "status-red";
            }

            
            tableRows += `
<tr>
<td>${cells[0].innerText}</td> <td>${cells[1].innerText}</td> <td>${cells[2].innerText}</td> <td>${cells[3].innerText}</td> <td>${cells[4].innerText}</td> <td>${cells[5].innerText}</td> <td>${cells[6].innerText}</td> <td class="${statusClass}">${cells[7].innerText}</td> <td class="${downtimeClass}">${cells[8].innerText}</td> </tr>`;
        }
    });

    // Kandungan HTML Laporan Larian Harian
    let htmlContent = `

function cleanDowntime(raw){

  if(!raw) return "";

  // 🔥 CASE 1: Google date string (1899 issue)
  if(typeof raw === "string" && raw.includes("1899")){
    
    let date = new Date(raw);

    let m = date.getMinutes();
    let s = date.getSeconds();

    // 🔥 FIX: swap if wrong format (Google flips sometimes)
    if(m > 0 && s === 0){
      return "00:" + String(m).padStart(2,'0');
    }

    return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }

  // Already correct
  if(/^\d{2}:\d{2}$/.test(raw)){
    return raw;
  }

  // Number case
  if(!isNaN(raw)){
    let sec = parseInt(raw);
    let m = Math.floor(sec / 60);
    let s = sec % 60;

    return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }

  return raw;
}
